name: Experiment 20 CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ================================================================
  #  CI  –  Run tests
  # ================================================================

  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Experiment_20/backend

    env:
      TESTING: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          source venv/bin/activate
          pytest


  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Experiment_20/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test -- --run


  # ================================================================
  #  CD  –  Build and push Docker images (only after tests pass)
  # ================================================================

  backend-docker:
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: Testing/Experiment_20/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fsd2-experiment20-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/fsd2-experiment20-backend:${{ github.sha }}


  frontend-docker:
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: Testing/Experiment_20/frontend
          file: Testing/Experiment_20/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fsd2-experiment20-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/fsd2-experiment20-frontend:${{ github.sha }}


  # ================================================================
  #  Deploy  –  Pull latest images, run via Docker Compose, smoke test
  # ================================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-docker, frontend-docker]

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest images
        working-directory: Testing/Experiment_20
        run: docker compose pull backend frontend

      - name: Start all services
        working-directory: Testing/Experiment_20
        run: docker compose up -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/; then
              echo "Backend is up"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Backend did not start in time"
          docker compose -f Testing/Experiment_20/docker-compose.yml logs
          exit 1

      - name: Smoke test – register endpoint
        run: |
          curl -sf -X POST http://localhost:5000/register \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"test"}' \
            | grep -q "Registered"
          echo "Register endpoint OK"

      - name: Show running containers
        if: always()
        run: docker ps -a

      - name: Show logs on failure
        if: failure()
        working-directory: Testing/Experiment_20
        run: docker compose logs